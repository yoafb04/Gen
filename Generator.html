<script>
// ==================== IP DETECTION AND AUTHENTICATION ====================

// Store the detected IP globally (hidden from user)
let currentUserIP = '';

// Function to get the user's IP address (silently in background)
async function detectUserIP() {
    try {
        // Try multiple IP detection services
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        currentUserIP = data.ip;
        console.log('IP detected successfully'); // For debugging only
    } catch (error) {
        console.error('IP detection failed:', error);
        // Fallback to a mock IP for testing (in production, you might want to block access)
        currentUserIP = '127.0.0.1';
    }
}

// Initialize IP detection on page load (silent)
detectUserIP();

// Login function
function attemptLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorDiv = document.getElementById('loginError');
    
    // Check credentials (username must be 'admin', password must match detected IP)
    if (username === 'admin' && password === currentUserIP) {
        // Successful login
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appWrapper').style.display = 'flex';
        
        // Initialize the app
        rebuildTargetInputs();
        updateSeries();
        
        // Clear password field for security
        document.getElementById('password').value = '';
        errorDiv.textContent = ''; // Clear any error messages
    } else {
        // Failed login
        errorDiv.textContent = 'Invalid username or password.';
        
        // Shake animation for error
        const loginScreen = document.getElementById('loginScreen');
        loginScreen.style.animation = 'shake 0.5s';
        setTimeout(() => {
            loginScreen.style.animation = '';
        }, 500);
        
        // Clear password field
        document.getElementById('password').value = '';
    }
}

// Logout function
function logout() {
    document.getElementById('appWrapper').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
    
    // Re-detect IP on logout (in case it changed) - still silent
    detectUserIP();
    
    // Clear any previous input
    document.getElementById('password').value = '';
    document.getElementById('username').value = 'admin';
}

// Add shake animation
const style = document.createElement('style');
style.textContent = `
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
    20%, 40%, 60%, 80% { transform: translateX(5px); }
}
`;
document.head.appendChild(style);

// Enter key for login
document.getElementById('password').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        attemptLogin();
    }
});

// ==================== ORIGINAL APP CODE (unchanged below) ====================

Chart.register(ChartDataLabels);

// Global mode variable
let currentMode = 'decreasing'; // 'decreasing', 'increasing', or 'import'

// ==================== SHARED UTILITIES ====================
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// FORCE movement - never allow same value twice in a row (for increasing mode)
function generateNextValue(prevValue, minVal, maxVal, trend = 0) {
    if (minVal >= maxVal) return minVal;
    
    // Ensure we have room to move
    if (maxVal - minVal <= 1) {
        // Very limited range, but still try to alternate
        if (minVal === prevValue && maxVal === prevValue) {
            return prevValue; // Stuck, can't change
        } else if (minVal === prevValue) {
            return maxVal;
        } else if (maxVal === prevValue) {
            return minVal;
        } else {
            return randomInt(minVal, maxVal);
        }
    }
    
    // Calculate bias based on trend and previous value
    let bias;
    if (trend > 0) {
        // Upward trend - bias toward upper half
        bias = 0.7;
    } else if (trend < 0) {
        // Downward trend - bias toward lower half
        bias = 0.3;
    } else {
        bias = 0.5;
    }
    
    // Try up to 10 times to get a different value
    for (let attempt = 0; attempt < 10; attempt++) {
        let nextVal;
        
        if (Math.random() < bias) {
            // Bias toward upper half
            const upperMin = Math.floor(minVal + (maxVal - minVal) * 0.5);
            nextVal = randomInt(Math.max(upperMin, minVal), maxVal);
        } else {
            // Bias toward lower half
            const lowerMax = Math.floor(minVal + (maxVal - minVal) * 0.5);
            nextVal = randomInt(minVal, Math.min(lowerMax, maxVal));
        }
        
        // If different from previous, accept it
        if (nextVal !== prevValue) {
            return nextVal;
        }
    }
    
    // If we couldn't get a different value, force a change
    if (prevValue === minVal && maxVal > minVal) {
        return prevValue + 1;
    } else if (prevValue === maxVal && maxVal > minVal) {
        return prevValue - 1;
    } else if (prevValue > minVal && prevValue < maxVal) {
        // Go in opposite direction of last attempt
        return (Math.random() < 0.5) ? prevValue - 1 : prevValue + 1;
    }
    
    return prevValue;
}

// Generate block with guaranteed movement (for increasing mode)
function generateMovingBlock(prevValue, length, variability, minVal = 0, maxVal = Infinity, trend = 0) {
    const block = [];
    let current = prevValue;
    
    for (let i = 0; i < length; i++) {
        // Calculate immediate bounds from variability
        const localMin = Math.max(minVal, current - variability);
        const localMax = Math.min(maxVal, current + variability);
        
        // Get next value with guaranteed movement
        current = generateNextValue(current, localMin, localMax, trend);
        block.push(current);
    }
    return block;
}

// ==================== DECREASING MODE FUNCTIONS (Original Perfect Version) ====================

// Generate a value that creates natural up-and-down movement (decreasing)
function generateMovingValueDecreasing(prevValue, targetBase, variability, maxPossible = null, minPossible = null) {
    // Calculate base range from variability
    const minFromPrev = prevValue - variability;
    const maxFromPrev = prevValue + variability;
    
    // Apply global constraints
    const globalMin = minPossible !== null ? minPossible : Math.max(0, targetBase - variability);
    const globalMax = maxPossible !== null ? maxPossible : targetBase + variability;
    
    // Get the valid range
    let validMin = Math.max(minFromPrev, globalMin);
    let validMax = Math.min(maxFromPrev, globalMax);
    
    // Ensure we have a valid range
    if (validMin > validMax) {
        validMin = Math.max(prevValue - variability, globalMin);
        validMax = Math.min(prevValue + variability, globalMax);
    }
    
    // FORCE MOVEMENT: Avoid staying too close to previous value
    const range = validMax - validMin;
    
    if (range <= 1) {
        return randomInt(validMin, validMax);
    }
    
    // Create bias toward moving away from the previous value
    const center = (validMin + validMax) / 2;
    
    if (prevValue <= center) {
        // If we're in lower half, bias toward going up
        return randomInt(Math.min(prevValue + 1, validMax), validMax);
    } else {
        // If we're in upper half, bias toward going down
        return randomInt(validMin, Math.max(prevValue - 1, validMin));
    }
}

// Generate block with natural movement (decreasing)
function generateMovingBlockDecreasing(prevValue, length, targetBase, variability, maxPossible = null, minPossible = null, minAllowed = null) {
    const block = [];
    let current = prevValue;
    let lastDirection = 0; // -1 down, 0 neutral, 1 up
    
    for (let i = 0; i < length; i++) {
        // Calculate range from variability
        const minFromPrev = current - variability;
        const maxFromPrev = current + variability;
        
        const globalMin = minPossible !== null ? minPossible : Math.max(0, targetBase - variability);
        const globalMax = maxPossible !== null ? maxPossible : targetBase + variability;
        
        let validMin = Math.max(minFromPrev, globalMin);
        let validMax = Math.min(maxFromPrev, globalMax);
        
        // Apply minimum allowed value (for baseline/initial gap to stay above first target)
        if (minAllowed !== null) {
            validMin = Math.max(validMin, minAllowed);
        }
        
        if (validMin > validMax) {
            validMin = Math.max(current - variability, globalMin);
            validMax = Math.min(current + variability, globalMax);
            if (minAllowed !== null) {
                validMin = Math.max(validMin, minAllowed);
            }
        }
        
        // FORCE OSCILLATION: Try to alternate direction
        let nextVal;
        
        if (validMax - validMin <= 1) {
            nextVal = randomInt(validMin, validMax);
        } else {
            if (lastDirection === 1) {
                // Last move was up, try to go down
                const downMax = Math.min(current - 1, validMax);
                if (downMax >= validMin) {
                    nextVal = randomInt(validMin, downMax);
                    lastDirection = -1;
                } else {
                    nextVal = randomInt(current + 1, validMax);
                    lastDirection = 1;
                }
            } else if (lastDirection === -1) {
                // Last move was down, try to go up
                const upMin = Math.max(current + 1, validMin);
                if (upMin <= validMax) {
                    nextVal = randomInt(upMin, validMax);
                    lastDirection = 1;
                } else {
                    nextVal = randomInt(validMin, current - 1);
                    lastDirection = -1;
                }
            } else {
                // First move, choose randomly but ensure movement
                if (Math.random() < 0.5 && current + 1 <= validMax) {
                    nextVal = randomInt(current + 1, validMax);
                    lastDirection = 1;
                } else if (current - 1 >= validMin) {
                    nextVal = randomInt(validMin, current - 1);
                    lastDirection = -1;
                } else {
                    nextVal = randomInt(validMin, validMax);
                }
            }
        }
        
        block.push(nextVal);
        current = nextVal;
    }
    return block;
}

// Generate ST block with guaranteed movement between values (decreasing)
function generateSTBlockDecreasing(prevValue, target, variability, length = 4) {
    const block = [];
    let current = prevValue;
    
    for (let i = 0; i < length; i++) {
        // Calculate valid range
        const minFromPrev = Math.max(0, current - variability);
        const maxFromPrev = current + variability;
        const targetMin = Math.max(0, target - variability);
        const targetMax = target; // Cannot exceed target
        
        let validMin = Math.max(minFromPrev, targetMin);
        let validMax = Math.min(maxFromPrev, targetMax);
        
        // Ensure we have a valid range
        if (validMin > validMax) {
            validMin = Math.max(current - variability, 0);
            validMax = Math.min(current + variability, target);
        }
        
        // FORCE MOVEMENT: Cannot equal previous value unless no other option
        let nextVal;
        let attempts = 0;
        const maxAttempts = 20;
        
        do {
            if (validMax - validMin <= 1) {
                // Very limited range, but still try to alternate
                if (validMin === current && validMax === current) {
                    // Truly stuck, accept same value
                    nextVal = current;
                    break;
                } else if (validMin === current) {
                    nextVal = validMax;
                } else if (validMax === current) {
                    nextVal = validMin;
                } else {
                    nextVal = randomInt(validMin, validMax);
                }
            } else {
                // Good range, ensure movement by avoiding current value
                // and creating natural oscillation
                
                // Look at direction patterns
                if (i === 0) {
                    // First ST value - transition from gap
                    // Try to go down toward target, but with movement
                    const downTarget = Math.max(validMin, Math.floor((validMin + validMax) / 2));
                    if (Math.random() < 0.7) {
                        nextVal = randomInt(validMin, downTarget);
                    } else {
                        nextVal = randomInt(downTarget + 1, validMax);
                    }
                } else {
                    // Create oscillation pattern
                    const range = validMax - validMin;
                    const third = Math.floor(range / 3);
                    
                    if (current <= validMin + third) {
                        // Near bottom, push up
                        nextVal = randomInt(Math.min(current + 1, validMax), validMax);
                    } else if (current >= validMax - third) {
                        // Near top, push down
                        nextVal = randomInt(validMin, Math.max(current - 1, validMin));
                    } else {
                        // In middle, can go either way
                        if (Math.random() < 0.5) {
                            nextVal = randomInt(validMin, Math.max(current - 1, validMin));
                        } else {
                            nextVal = randomInt(Math.min(current + 1, validMax), validMax);
                        }
                    }
                }
            }
            
            attempts++;
            
            // Safety: if we can't find a different value after many attempts, accept current
            if (attempts > maxAttempts) {
                if (nextVal === current && validMin < validMax) {
                    // Force a different value
                    nextVal = (nextVal === validMin) ? validMax : validMin;
                }
                break;
            }
        } while (nextVal === current && validMin < validMax);
        
        block.push(nextVal);
        current = nextVal;
    }
    
    return block;
}

// Decreasing mode series generator (Original Perfect Version)
function generateSeriesDecreasing(baseline, totalWeeks, customTargets, stVariability, initialGap, minGap, maxGap){
    const series = [];
    const stWeeks = [];
    const stTargets = {};
    const phaseBoundaries = [];
    const phaseLabels = [];
    
    let week = 0;
    let lastValue = baseline;

    series.push(baseline); 
    week++;
    
    phaseBoundaries.push(0);
    phaseLabels.push("Baseline");

    const firstTarget = customTargets.length > 0 ? customTargets[0] : null;

    // INITIAL GAP - part of baseline phase, must stay above first target
    if (initialGap > 0 && firstTarget !== null) {
        const minAllowed = firstTarget + 1;
        
        let tries = 0;
        const MAX_TRIES = 100;
        let initialGapBlock = [];
        let valid = false;
        
        do {
            initialGapBlock = generateMovingBlockDecreasing(lastValue, initialGap, baseline, stVariability, baseline, null, minAllowed);
            
            valid = true;
            for (let val of initialGapBlock) {
                if (val <= firstTarget) {
                    valid = false;
                    break;
                }
            }
            
            tries++;
            if (tries >= MAX_TRIES) {
                initialGapBlock = [];
                let current = lastValue;
                for (let i = 0; i < initialGap; i++) {
                    const minVal = Math.max(current - stVariability, minAllowed);
                    const maxVal = Math.min(current + stVariability, baseline + stVariability);
                    if (minVal > maxVal) {
                        current = minAllowed;
                    } else {
                        current = randomInt(minVal, maxVal);
                    }
                    initialGapBlock.push(current);
                }
                valid = true;
                break;
            }
        } while (!valid);
        
        for(let g of initialGapBlock){
            if(week >= totalWeeks) break;
            series.push(g);
            lastValue = g;
            week++;
        }
    } else if (initialGap > 0) {
        const initialGapBlock = generateMovingBlockDecreasing(lastValue, initialGap, baseline, stVariability, baseline);
        
        for(let g of initialGapBlock){
            if(week >= totalWeeks) break;
            series.push(g);
            lastValue = g;
            week++;
        }
    }

    for(let idx = 0; idx < customTargets.length; idx++) {
        const target = customTargets[idx];
        
        phaseBoundaries.push(week);
        phaseLabels.push(`Intervention ${idx+1} (Target: ${target})`);

        if (idx > 0) {
            const gapLength = randomInt(minGap, maxGap);
            let gapBlock = [];

            function violatesFourConsecutive(arr, tgt) {
                let count = 0;
                for (let v of arr) {
                    if (v <= tgt) { count++; if (count>=4) return true; }
                    else count = 0;
                }
                return false;
            }

            let tries = 0, MAX_TRIES = 200;
            do {
                gapBlock = generateMovingBlockDecreasing(lastValue, gapLength, lastValue, stVariability, lastValue);
                tries++;
                if (tries === MAX_TRIES) {
                    gapBlock = generateMovingBlockDecreasing(lastValue, gapLength, lastValue, Math.max(1, stVariability*2), lastValue);
                    break;
                }
            } while (gapBlock[gapBlock.length - 1] <= target || violatesFourConsecutive(gapBlock, target));

            for(let g of gapBlock){
                if(week >= totalWeeks) break;
                series.push(g);
                lastValue = g;
                week++;
            }
        }

        if(week + 4 > totalWeeks) break;

        const stBlock = generateSTBlockDecreasing(lastValue, target, stVariability, 4);
        
        for(let i = 0; i < stBlock.length && week < totalWeeks; i++) {
            series.push(stBlock[i]);
            stWeeks.push(week);
            stTargets[week] = target;
            lastValue = stBlock[i];
            week++;
        }
    }

    // Fill remaining weeks
    while(series.length < totalWeeks){
        const validMin = Math.max(0, lastValue - stVariability);
        const validMax = lastValue + stVariability;
        
        let nextVal;
        if (validMax - validMin <= 1) {
            nextVal = randomInt(validMin, validMax);
        } else {
            const lastFew = series.slice(-3);
            let trend = 0;
            for (let j = 1; j < lastFew.length; j++) {
                trend += lastFew[j] > lastFew[j-1] ? 1 : -1;
            }
            
            if (trend > 2) {
                nextVal = randomInt(validMin, Math.max(validMin, lastValue - 1));
            } else if (trend < -2) {
                nextVal = randomInt(Math.min(validMax, lastValue + 1), validMax);
            } else {
                if (Math.random() < 0.5) {
                    nextVal = randomInt(validMin, Math.max(validMin, lastValue - 1));
                } else {
                    nextVal = randomInt(Math.min(validMax, lastValue + 1), validMax);
                }
            }
        }
        
        series.push(nextVal);
        lastValue = nextVal;
    }

    return {series, stWeeks, stTargets, phaseBoundaries, phaseLabels};
}

// ==================== INCREASING MODE FUNCTIONS (Improved with guaranteed movement) ====================

// ST block for INCREASING mode (values ≥ target) - with guaranteed movement
function generateSTBlockIncreasing(prevValue, target, variability, length = 4) {
    const block = [];
    let current = Math.max(prevValue, target);
    
    for (let i = 0; i < length; i++) {
        // Range: target to target + variability
        const minVal = target;
        const maxVal = target + variability;
        
        // Local bounds from current value
        const localMin = Math.max(minVal, current - variability);
        const localMax = Math.min(maxVal, current + variability);
        
        // Get next value with guaranteed movement
        current = generateNextValue(current, localMin, localMax, 0.2); // Slight upward bias
        block.push(current);
    }
    return block;
}

// Increasing mode series generator (Improved with guaranteed movement)
function generateSeriesIncreasing(baseline, totalWeeks, customTargets, stVariability, initialGap, minGap, maxGap) {
    const series = [];
    const stWeeks = [];
    const stTargets = {};
    const phaseBoundaries = [];
    const phaseLabels = [];
    
    let week = 0;
    let lastValue = baseline;

    series.push(baseline); 
    week++;
    
    phaseBoundaries.push(0);
    phaseLabels.push("Baseline");

    const firstTarget = customTargets.length > 0 ? customTargets[0] : null;

    // Track the current floor (can't go below last mastered target)
    let currentFloor = baseline;

    // INITIAL GAP - must stay below first target
    if (initialGap > 0 && firstTarget !== null) {
        const maxAllowed = firstTarget - 1;
        
        let tries = 0;
        const MAX_TRIES = 100;
        let initialGapBlock = [];
        let valid = false;
        
        do {
            initialGapBlock = generateMovingBlock(lastValue, initialGap, stVariability, baseline, maxAllowed, 0.2);
            
            valid = true;
            for (let val of initialGapBlock) {
                if (val >= firstTarget) {
                    valid = false;
                    break;
                }
            }
            
            tries++;
            if (tries >= MAX_TRIES) {
                initialGapBlock = [];
                let current = lastValue;
                for (let i = 0; i < initialGap; i++) {
                    current = randomInt(Math.max(current - stVariability, baseline), 
                                      Math.min(current + stVariability, firstTarget - 1));
                    initialGapBlock.push(current);
                }
                valid = true;
                break;
            }
        } while (!valid);
        
        for(let g of initialGapBlock){
            if(week >= totalWeeks) break;
            series.push(g);
            lastValue = g;
            week++;
        }
    } else if (initialGap > 0) {
        const initialGapBlock = generateMovingBlock(lastValue, initialGap, stVariability, baseline, Infinity, 0.2);
        for(let g of initialGapBlock){
            if(week >= totalWeeks) break;
            series.push(g);
            lastValue = g;
            week++;
        }
    }

    for(let idx = 0; idx < customTargets.length; idx++) {
        const target = customTargets[idx];
        
        phaseBoundaries.push(week);
        phaseLabels.push(`Intervention ${idx+1} (Target: ${target})`);

        // Gaps between cumplimientos - must stay below next target but above current floor
        if (idx > 0) {
            const gapLength = randomInt(minGap, maxGap);
            let gapBlock = [];

            function violatesFourConsecutive(arr, tgt) {
                let count = 0;
                for (let v of arr) {
                    if (v >= tgt) count++;
                    else count = 0;
                    if (count >= 4) return true;
                }
                return false;
            }

            let tries = 0, MAX_TRIES = 200;
            do {
                gapBlock = generateMovingBlock(lastValue, gapLength, stVariability, currentFloor, target - 1, 0.3);
                tries++;
                if (tries === MAX_TRIES) {
                    gapBlock = generateMovingBlock(lastValue, gapLength, stVariability * 1.5, currentFloor, target - 1, 0.3);
                    break;
                }
            } while (gapBlock[gapBlock.length - 1] >= target || violatesFourConsecutive(gapBlock, target));

            for(let g of gapBlock){
                if(week >= totalWeeks) break;
                series.push(g);
                lastValue = g;
                week++;
            }
        }

        if(week + 4 > totalWeeks) break;

        // ST block
        const stBlock = generateSTBlockIncreasing(lastValue, target, stVariability, 4);
        
        for(let i = 0; i < stBlock.length && week < totalWeeks; i++) {
            series.push(stBlock[i]);
            stWeeks.push(week);
            stTargets[week] = target;
            lastValue = stBlock[i];
            week++;
        }
        
        // Update floor after mastery
        currentFloor = target;
    }

    // Fill remaining weeks with guaranteed movement and upward trend
    const remainingWeeks = totalWeeks - series.length;
    if (remainingWeeks > 0) {
        const fillBlock = generateMovingBlock(lastValue, remainingWeeks, stVariability, currentFloor, Infinity, 0.4);
        for(let val of fillBlock) {
            series.push(val);
        }
    }

    return {series, stWeeks, stTargets, phaseBoundaries, phaseLabels};
}

// ==================== IMPORT MODE FUNCTIONS ====================

function parseImportedData(text) {
    // Split by any whitespace (spaces, newlines, tabs) and commas
    const numbers = text.split(/[\s,]+/).filter(item => item.trim() !== '');
    
    // Convert to numbers and filter out invalid ones
    const validNumbers = [];
    for (let num of numbers) {
        const parsed = parseFloat(num);
        if (!isNaN(parsed) && isFinite(parsed)) {
            validNumbers.push(parsed);
        }
    }
    
    return validNumbers;
}

function plotImportedData() {
    const importText = document.getElementById('importData').value;
    const numbers = parseImportedData(importText);
    
    if (numbers.length === 0) {
        alert('Please enter valid numbers to plot');
        return;
    }
    
    // Create series data
    const series = numbers;
    const totalWeeks = numbers.length;
    
    // No ST points in import mode
    const stWeeks = [];
    const stTargets = {};
    const phaseBoundaries = [0];
    const phaseLabels = ["Imported Data"];
    
    document.getElementById('modeIndicator').textContent = 'Mode: Imported Data';
    
    // Update output
    const outputDiv = document.getElementById("output");
    outputDiv.textContent = "";
    
    for (let i = 0; i < series.length; i++) {
        outputDiv.textContent += series[i] + "\n";
    }

    // Update chart
    const labels = Array.from({length: totalWeeks}, (_, i) => i+1);
    
    if(chart) chart.destroy();
    const ctx = document.getElementById("seriesChart").getContext("2d");

    chart = new Chart(ctx, {
        type:'line',
        plugins:[ChartDataLabels],
        data:{
            labels: labels,
            datasets:[
                {
                    label:'Imported Data', 
                    data:series, 
                    borderColor:'#4caf50', 
                    backgroundColor: 'transparent',
                    fill:false, 
                    tension:0,
                    pointRadius:5,
                    pointBackgroundColor: '#4caf50',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 1.5,
                    datalabels:{
                        display:true, 
                        color:'#333', 
                        font:{size:10, weight:'bold'}, 
                        anchor:'end', 
                        align:'top', 
                        offset:5
                    }
                }
            ]
        },
        options:{
            responsive: true,
            maintainAspectRatio: false,
            plugins:{
                legend:{ display:true, position:'bottom' }
            }, 
            scales:{
                y:{
                    beginAtZero:true, 
                    title: { display: true, text: 'Frequency', font: { weight: 'bold', size: 12 } },
                    ticks:{stepSize:5},
                    grid:{color:'#e0e0e0'}
                },
                x:{
                    title:{ display:true, text:'Sessions (Weeks)', font: { weight: 'bold', size: 12 } },
                    grid:{color:'#e0e0e0'}
                }
            },
            layout:{padding:{top:30, left:10, right:10, bottom:10}}
        }
    });
}

// ==================== CHART AND UI ====================

let chart;

function rebuildTargetInputs() {
    const container = document.getElementById('cumTargetsContainer');
    const cumCount = parseInt(document.getElementById('totalCumplimientos').value) || 3;
    const baseline = parseInt(document.getElementById('baseline').value) || (currentMode === 'decreasing' ? 100 : 4);
    
    let html = '';
    for (let i = 1; i <= cumCount; i++) {
        const existingInput = document.querySelector(`#cumTarget_${i}`);
        let savedVal;
        
        if (existingInput) {
            savedVal = existingInput.value;
        } else {
            if (currentMode === 'decreasing') {
                savedVal = Math.max(5, 87 - (i-1)*9); // Decreasing pattern: 87,78,69...
            } else {
                savedVal = baseline + (i * 8); // Increasing pattern: 12,20,28...
            }
        }
        
        html += `<div class="cum-item">
            <span>ST₍${i}₎</span>
            <input type="number" id="cumTarget_${i}" class="cumTargetInput" value="${savedVal}" min="0" step="1">
        </div>`;
    }
    container.innerHTML = html;
    
    document.querySelectorAll('.cumTargetInput').forEach(inp => {
        inp.addEventListener('input', updateSeries);
        inp.addEventListener('change', updateSeries);
    });
}

function updateSeries(){
    // Don't update if in import mode
    if (currentMode === 'import') return;
    
    const baseline = parseInt(document.getElementById("baseline").value);
    const totalWeeks = parseInt(document.getElementById("totalWeeks").value);
    const cumCount = parseInt(document.getElementById("totalCumplimientos").value);
    const stVariability = parseInt(document.getElementById("stVariability").value);
    const initialGap = parseInt(document.getElementById("initialGap").value);
    const minGap = parseInt(document.getElementById("minGap").value);
    const maxGap = parseInt(document.getElementById("maxGap").value);

    if (minGap > maxGap) {
        alert("Min Gap cannot be greater than Max Gap");
        return;
    }

    let customTargets = [];
    for (let i = 1; i <= cumCount; i++) {
        const inp = document.getElementById(`cumTarget_${i}`);
        if (inp) {
            let val = parseInt(inp.value);
            if (isNaN(val)) val = currentMode === 'decreasing' ? 50 : 20;
            customTargets.push(val);
        }
    }

    // Choose the appropriate generator based on mode
    const result = currentMode === 'decreasing' 
        ? generateSeriesDecreasing(baseline, totalWeeks, customTargets, stVariability, initialGap, minGap, maxGap)
        : generateSeriesIncreasing(baseline, totalWeeks, customTargets, stVariability, initialGap, minGap, maxGap);

    const {series, stWeeks, stTargets, phaseBoundaries, phaseLabels} = result;

    document.getElementById('modeIndicator').textContent = 
        currentMode === 'decreasing' ? 'Mode: Decreasing (≤ targets)' : 'Mode: Increasing (≥ targets)';

    // Single column output
    const outputDiv = document.getElementById("output");
    outputDiv.textContent = "";
    
    for (let i = 0; i < series.length; i++) {
        let v = series[i];
        let line = v.toString();
        
        if (stWeeks.includes(i)) {
            let tgt = stTargets[i];
            let marker = currentMode === 'decreasing' ? " ≤" + tgt : " ≥" + tgt;
            let sameTargetWeeks = stWeeks.filter(w => stTargets[w] === tgt);
            let lastST = Math.max(...sameTargetWeeks);
            if (i === lastST) marker += " M";
            
            line += marker;
        }
        
        outputDiv.textContent += line + "\n";
    }

    const labels = Array.from({length: totalWeeks}, (_, i) => i+1);
    const scatterst = stWeeks.map(i => ({x:i+1, y:series[i]}));

    if(chart) chart.destroy();
    const ctx = document.getElementById("seriesChart").getContext("2d");

    const annotations = {};
    phaseBoundaries.forEach((boundary, index) => {
        if (boundary > 0 && boundary < totalWeeks) {
            annotations[`phaseLine${index}`] = {
                type: 'line',
                xMin: boundary + 0.5,
                xMax: boundary + 0.5,
                borderColor: '#000',
                borderWidth: 2,
                borderDash: [5, 3],
                label: {
                    content: phaseLabels[index] || '',
                    enabled: true,
                    position: 'top',
                    backgroundColor: 'rgba(255,255,255,0.8)',
                    font: {
                        size: 11,
                        weight: 'bold'
                    }
                }
            };
        }
    });

    chart = new Chart(ctx, {
        type:'line',
        plugins:[ChartDataLabels],
        data:{
            labels: labels,
            datasets:[
                {
                    label:'Frequency', 
                    data:series, 
                    borderColor:'#333', 
                    backgroundColor: 'transparent',
                    fill:false, 
                    tension:0,
                    pointRadius:5,
                    pointBackgroundColor: series.map((_, index) => {
                        if (index < phaseBoundaries[1] || phaseBoundaries.length <= 1) return '#666';
                        if (index < phaseBoundaries[2]) return '#2196f3';
                        if (index < phaseBoundaries[3]) return '#ff9800';
                        return '#4caf50';
                    }),
                    pointBorderColor: '#fff',
                    pointBorderWidth: 1.5,
                    datalabels:{
                        display:true, 
                        color:'#333', 
                        font:{size:10, weight:'bold'}, 
                        anchor:'end', 
                        align:'top', 
                        offset:5
                    }
                },
                {
                    label:'ST Points (Mastery)', 
                    data:scatterst, 
                    backgroundColor:'red', 
                    pointRadius:8, 
                    pointStyle: 'circle',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    showLine:false, 
                    type:'scatter', 
                    datalabels:{display:false}
                }
            ]
        },
        options:{
            responsive: true,
            maintainAspectRatio: false,
            plugins:{
                annotation: { annotations },
                legend:{ display:true, position:'bottom', labels: { usePointStyle: true, pointStyle: 'circle' } }
            }, 
            scales:{
                y:{
                    beginAtZero:true, 
                    suggestedMax: currentMode === 'decreasing' ? baseline+10 : baseline+40, 
                    title: { display: true, text: 'Frequency', font: { weight: 'bold', size: 12 } },
                    ticks:{stepSize:5},
                    grid:{color:'#e0e0e0'}
                },
                x:{
                    title:{ display:true, text:'Sessions (Weeks)', font: { weight: 'bold', size: 12 } },
                    grid:{color:'#e0e0e0'}
                }
            },
            layout:{padding:{top:30, left:10, right:10, bottom:10}}
        }
    });
}

    if (currentMode === 'decreasing') return;

    // Update tab styles
    document.getElementById('tabDecreasing').classList.add('active');

    document.getElementById('tabDecreasing').classList.remove('active');

    // Show/hide appropriate sections
    document.getElementById('generatorInputs').style.display = 'block';

document.getElementById('tabImport').addEventListener('click', function() {
    if (currentMode === 'import') return;
    currentMode = 'import';
    
    // Update tab styles
    document.getElementById('tabImport').classList.add('active');
    document.getElementById('tabDecreasing').classList.remove('active');
    document.getElementById('tabIncreasing').classList.remove('active');
    document.getElementById('tabImport').style.background = '#2e7d32';
    
    // Show/hide appropriate sections
    document.getElementById('generatorInputs').style.display = 'none';
    document.getElementById('importArea').style.display = 'block';
    
    // Clear output and show example
    document.getElementById('modeIndicator').textContent = 'Mode: Import Data';

});

// Event listeners
document.getElementById('plotImportBtn').addEventListener('click', plotImportedData);

function setupInputListeners() {
    document.getElementById('totalCumplimientos').addEventListener('input', function() {
        rebuildTargetInputs();
        updateSeries();
    });
    
    ['baseline', 'totalWeeks', 'stVariability', 'initialGap', 'minGap', 'maxGap'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateSeries);
    });
    
    document.getElementById("refreshBtn").addEventListener("click", function() {
        if (currentMode === 'import') {
            plotImportedData();
        } else {
            rebuildTargetInputs();
            updateSeries();
        }
    });
}

setupInputListeners();

// Auto-focus username field
document.getElementById('username').focus();
